<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mozilla+Headline:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="right panel.css">

    <script src="script.js" defer></script>
    <title>Form_fill</title>
</head>
<body>
<div class="header">
  
    <div class="main-content">
        <h1>Welcome to Form_fill_css_Prototype!</h1>
        <h2 style="margin-bottom:0px;">Form</h2>
        <h4 style="margin-top:0px;color:grey;">fill the required fields carefully</h4>
        
        <form action="web.html" method="get">
            <div class="form">
                <div class="input-container">
                    <input type="text" id="username" class="fancy-input" placeholder=" " required>
                    <label for="username" class="input-label"><span class="if_any" style="color:#78909c;font-size:16px;">Enter</span> your name</label>
                </div>
                
                <div class="input-container">
                    <input type="text" id="business_name" class="fancy-input" placeholder=" " required>
                    <label for="business_name" class="input-label"><span class="if_any" style="color:#78909c;font-size:16px;">Enter</span> name of Your business</label>
                </div>
                
                <div class="input-container">
                    <input oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)" id="mobile" class="fancy-input" placeholder=" ">
                    <label for="mobile" class="input-label"><span class="if_any" style="color:#78909c;font-size:16px;">Enter</span> your Mobile No. <span class="if_any">(if any)</span></label>
                </div>
                
                <div class="input-container">
                    <input type="email" id="email" class="fancy-input" placeholder=" ">
                    <label for="email" class="input-label"><span class="if_any" style="color:#78909c;font-size:16px;">Enter</span> your email <span class="if_any">(if any)</span></label>
                </div>
                
                <div class="input-container">
                    <textarea id="address" class="fancy-input" placeholder=" "></textarea>
                    <label for="address" class="input-label"><span class="if_any" style="color:#78909c;font-size:16px;">Enter</span> your Address <span class="if_any">(if any)</span></label>
                </div>
                
                <button type="submit" class="submit" id="submitBtn">Proceed</button>
            </div>
        </form>
    </div>
    <div class="panel">
        Select the Issue you want to Solve and click on the button to proceed.<br><br>
        <div class=" issue-list">
            <label class="checkbox-container">
                <input type="checkbox" class="hidden-checkbox">
                <span class="checkbox-box"></span>
                <span class="checkbox-text"><span class="issue">Issue 1:</span> Website not loading</span>
            
            </label>
            <label class="checkbox-container">
                <input type="checkbox" class="hidden-checkbox">
                <span class="checkbox-box"></span>
                <span class="checkbox-text"><span class="issue">Issue 2:</span> Unable to login</span>
            </label>
            <label class="checkbox-container">
                 <input type="checkbox" class="hidden-checkbox">
            <span class="checkbox-box"></span>
            <span class="checkbox-text"><span class="issue">Issue 3:</span> Payment failure</span>
        </label>  
        <label class="checkbox-container">
                <input type="checkbox" class="hidden-checkbox">
                <span class="checkbox-box"></span>
                <span class="checkbox-text"><span class="issue">Issue 4:</span> animations are not working</span>
            </label>
            <label class="checkbox-container">
                <input type="checkbox" class="hidden-checkbox">
                <span class="checkbox-box"></span>
                <span class="checkbox-text"><span class="issue">Issue 5:</span> Unable to buy items</span>
            </label>
            <label class="checkbox-container">
                 <input type="checkbox" class="hidden-checkbox">
            <span class="checkbox-box"></span>
            <span class="checkbox-text"><span class="issue">Issue 6:</span> loading failure</span>
        </label>  
        <label class="checkbox-container">
                <input type="checkbox" class="hidden-checkbox">
                <span class="checkbox-box"></span>
                <span class="checkbox-text"><span class="issue">Issue 7:</span> error message</span>
            </label>
            <label class="checkbox-container">
                <input type="checkbox" class="hidden-checkbox">
                <span class="checkbox-box"></span>
                <span class="checkbox-text"><span class="issue">Issue 8:</span> authentication failure</span>
            </label>
            <label class="checkbox-container">
                 <input type="checkbox" class="hidden-checkbox">
            <span class="checkbox-box"></span>
            <span class="checkbox-text"><span class="issue">Issue 9:</span> other</span>
        </label>  
        
        
        </div>
       <a href="demo.html" class="final-submit-button" style="color: white;">
    Proceed
</a>
    </div>
    
</div>
</body>
</html>
